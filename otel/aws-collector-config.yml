---
# https://opentelemetry.io/docs/collector/configuration/
# https://docs.datadoghq.com/tracing/setup_overview/open_standards/
# https://github.com/aws-observability/aws-otel-collector/blob/main/config.yaml
# https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/exporter/datadogexporter
# https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/exporter/datadogexporter/example/config.yaml
# https://docs.aws.amazon.com/prometheus/latest/userguide/AMP-onboard-ingest-metrics-OpenTelemetry-ECS.html

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      global:
        scrape_interval: 15s
        scrape_timeout: 10s
      scrape_configs:
      - job_name: ${env:COMPONENT}
        static_configs:
        # telemetry_metrics_prometheus default port
        # - targets: [ 127.0.0.1:9568 ]
        # prom_ex on main app /metrics
        # - targets: [ 127.0.0.1:4000 ]
        # prom_ex separate server
        - targets: [ 127.0.0.1:9111 ]
        # running in docker compose
        # - targets: [ prod:9111 ]

  # Collect ECS container metrics from the ECS agent running on the host
  # https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/awsecscontainermetricsreceiver
  awsecscontainermetrics:
    collection_interval: 20s

processors:
  batch/traces:
    timeout: 1s
    send_batch_size: 50
  batch/metrics:
    timeout: 60s

  # Detect resources
  # https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/processor/resourcedetectionprocessor/README.md
  # https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/processor/resourcedetectionprocessor/internal/aws/ecs/documentation.md
  resourcedetection:
    # detectors: [env, cs, ec2, ecs, gcp, azure, system]
    detectors: [env, ecs]
    # timeout: 2s
    # override: false
    #
    # ECS attributes:
    #   aws.ecs.cluster.arn
    #   aws.ecs.launchtype
    #   aws.ecs.task.arn
    #   aws.ecs.task.family
    #   aws.ecs.task.id
    #   aws.ecs.task.revision
    #   aws.log.group.arns
    #   aws.log.group.names
    #   aws.log.stream.arns
    #   aws.log.stream.names
    #   cloud.account.id
    #   cloud.availability_zone
    #   cloud.platform
    #   cloud.provider
    #   cloud.region

  resource/ecs:
    attributes:
      - key: job
        from_attribute: aws.ecs.task.family
        action: upsert
      - key: instance
        from_attribute: aws.ecs.task.id
        action: upsert
      # - key: task_rev
      #   action: upsert
      #   from_attribute: aws.ecs.task.revision
      # - key: service.name
      #   action: upsert
      #   from_attribute: aws.ecs.task.family
      # - key: service.instance.id
      #   action: upsert
      #   from_attribute: aws.ecs.task.id

      # Delete unused resource attributes
      # This is dumb, but there is no "keep only" action
      - key: server.port
        action: delete
      - key: service.instance.id
        action: delete
      - key: url.scheme
        action: delete

      - key: aws.ecs.cluster.arn
        action: delete
      - key: aws.ecs.launchtype
        action: delete
      - key: aws.ecs.task.arn
        action: delete
      - key: aws.ecs.task.family
        action: delete
      - key: aws.ecs.task.id
        action: delete
      - key: aws.ecs.task.revision
        action: delete
      - key: aws.log.group.arns
        action: delete
      - key: aws.log.group.names
        action: delete
      - key: aws.log.stream.arns
        action: delete
      - key: aws.log.stream.names
        action: delete
      - key: cloud.account.id
        action: delete
      - key: cloud.availability_zone
        action: delete
      - key: cloud.platform
        action: delete
      - key: cloud.provider
        action: delete
      # - key: cloud.region
      #   action: delete

  # Convert resource attributes to metrics for ECS container metrics
  # https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/awsecscontainermetricsreceiver#available-metrics
  resource/ecscontainermetrics:
    attributes:
      - key: job
        from_attribute: aws.ecs.task.family
        action: upsert
      - key: instance
        from_attribute: aws.ecs.task.id
        action: upsert

      - key: aws.ecs.cluster.name
        action: delete
      - key: aws.ecs.container.created_at
        action: delete
      - key: aws.ecs.container.exit_code
        action: delete
      - key: aws.ecs.container.finished_at
        action: delete
      - key: aws.ecs.container.image.id
        action: delete
      - key: aws.ecs.container.started_at
        action: delete
      - key: aws.ecs.docker.name
        action: delete
      - key: aws.ecs.launch_type
        action: delete
      # - key: aws.ecs.service.name
      #   action: delete
      - key: aws.ecs.task.arn
        action: delete
      - key: aws.ecs.task.family
        action: delete
      - key: aws.ecs.task.id
        action: delete
      - key: aws.ecs.task.known_status
        action: delete
      - key: aws.ecs.task.pull_started_at
        action: delete
      - key: aws.ecs.task.pull_stopped_at
        action: delete
      - key: aws.ecs.task.revision
        action: delete
      - key: cloud.account.id
        action: delete
      - key: cloud.availability_zone
        action: delete
      # - key: cloud.region
      #   action: delete
      - key: container.id
        action: delete
      - key: container.image.tag
        action: delete
      - key: container.name
        action: delete
      - key: ws.ecs.container.known_status
        action: delete

  # Select only the ECS container metrics we want
  filter/ecs:
    metrics:
      include:
        match_type: strict
        metric_names:
          - ecs.task.memory.utilized
          - ecs.task.memory.reserved
          - ecs.task.cpu.utilized
          - ecs.task.cpu.reserved
          - ecs.task.network.rate.rx
          - ecs.task.network.rate.tx
          - ecs.task.storage.read_bytes
          - ecs.task.storage.write_bytes


exporters:
  awsxray:

  # Exporter for app metrics
  # https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/exporter/prometheusremotewriteexporter
  prometheusremotewrite:
    # endpoint: https://aps-workspaces.ap-northeast-1.amazonaws.com/workspaces/ws-f30498c4-6b52-4d6f-a888-6b2b4717c84e/api/v1/remote_write
    endpoint: ${env:PROMETHEUS_ENDPOINT}
    auth:
      authenticator: sigv4auth
    resource_to_telemetry_conversion:
      enabled: true
    # This doesn't work, no matter what AI says
    # resource_to_telemetry_conversion_allowed_list:
    #   - service.name
    #   - aws.ecs.task.family
    #   - task_rev
    # external_labels:
    #   task.family: aws.ecs.task.family

  # Exporter for ECS container metrics, separated to set different external labels and resource attributes
  prometheusremotewrite/ecs:
    # endpoint: https://aps-workspaces.ap-northeast-1.amazonaws.com/workspaces/ws-f30498c4-6b52-4d6f-a888-6b2b4717c84e/api/v1/remote_write
    # namespace: ECS/AWSOTel
    endpoint: ${env:PROMETHEUS_ENDPOINT}
    auth:
      authenticator: sigv4auth
    resource_to_telemetry_conversion:
      enabled: true
    #   # exclude_service_attributes: false
    # resource_to_telemetry_conversion_allowed_list:
    #   - service.name
    #   - aws.ecs.task.family
    # external_labels:
    #   task.family: aws.ecs.task.family
    # external_labels:
    #   component: ${env:COMPONENT}
    # external_labels:
    #   label_name1: label_value1
    #   label_name2: label_value2
    # resource_to_telemetry_conversion:
    #   enabled: true # Convert resource attributes to metric labels

  # Prometheus scrapable endpoint
  # prometheus:
  #   endpoint: 0.0.0.0:9888

  debug:
    # detailed, normal, basic
    verbosity: normal

extensions:
  # https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/extension/healthcheckextension/README.md
  health_check:
    endpoint: "localhost:13133"
  zpages:
    endpoint: 127.0.0.1:55679
  sigv4auth:
    region: ${env:AWS_REGION}
    service: aps

service:
  extensions: [health_check, zpages, sigv4auth]
  telemetry:
    # metrics:
    #   address: ":9888"
    logs:
      # debug, info, warn, error
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch/traces, resourcedetection]
      exporters: [awsxray]

    # App metrics
    metrics:
      receivers: [prometheus]
      processors: [resourcedetection, resource/ecs, batch/metrics]
      exporters: [prometheusremotewrite, debug]

    # ECS container metrics
    metrics/ecs:
      receivers: [awsecscontainermetrics]
      processors: [resource/ecscontainermetrics, filter/ecs, batch/metrics]
      exporters: [prometheusremotewrite/ecs, debug]

    # Prometheus scrapable endpoint
    # metrics:
    #   receivers: [prometheus]
    #   processors: [resourcedetection, attributes/debug]
    #   exporters: [prometheus]
